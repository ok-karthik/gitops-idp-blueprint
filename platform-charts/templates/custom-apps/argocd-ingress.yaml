apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    # Optional: Tells Traefik not to force HTTPS just yet, since we haven't configured Cert-Manager certificates
    ingress.kubernetes.io/ssl-redirect: "false" 
spec:
  rules:
    - host: argocd.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80