{{- if .Values.spec.bootstrapApplications }}
{{- range $app := .Values.spec.bootstrapApplications }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $app.name }}
  namespace: {{ $.Values.spec.destination.namespace }}
spec:
  project: {{ $.Values.spec.project }}
  source:
    repoURL: {{ $app.repoURL }}
    targetRevision: {{ $app.targetRevision }}
    chart: {{ $app.chart }}
    {{- if $app.helm }}
    # Conditionally render Helm parameters
    helm:
      {{- if $app.helm.parameters }}
      parameters:
        {{- range $param := $app.helm.parameters }}
        - name: {{ $param.name | quote }}
          value: {{ $param.value | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  destination:
    server: {{ $.Values.spec.destination.server }}
    namespace: {{ $app.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
     {{- if $app.syncOptions }}
      {{- range $option := $app.syncOptions }}
      - {{ $option }}
      {{- end }}
      {{- end }}
---
{{- end }}
{{- end }}