{{- if .Values.spec.bootstrapApplications }}
{{- range $app := .Values.spec.bootstrapApplications }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $app.name }}
  namespace: {{ $.Values.spec.destination.namespace }}
spec:
  project: {{ $.Values.spec.project }}
  source:
    repoURL: {{ $app.repoURL }}
    targetRevision: {{ $app.targetRevision }}
    chart: {{ $app.chart }}
  destination:
    server: {{ $.Values.spec.destination.server }}
    namespace: {{ $app.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
{{- end }}
{{- end }}